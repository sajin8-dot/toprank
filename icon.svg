<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b90" />
      <stop offset="100%" stop-color="#ffb37b" />
    </linearGradient>
    
    <!-- Star Gradient -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe600" />
      <stop offset="100%" stop-color="#ffaa00" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#ff4a6b" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="480" height="480" x="16" y="16" rx="96" fill="url(#bgGrad)" filter="url(#dropShadow)" />

  <!-- Dotted Bullet Journal Grid pattern in background -->
  <g opacity="0.15">
    <circle cx="80" cy="80" r="4" fill="#ffffff" />
    <circle cx="160" cy="80" r="4" fill="#ffffff" />
    <circle cx="240" cy="80" r="4" fill="#ffffff" />
    <circle cx="320" cy="80" r="4" fill="#ffffff" />
    <circle cx="400" cy="80" r="4" fill="#ffffff" />

    <circle cx="80" cy="160" r="4" fill="#ffffff" />
    <circle cx="160" cy="160" r="4" fill="#ffffff" />
    <circle cx="240" cy="160" r="4" fill="#ffffff" />
    <circle cx="320" cy="160" r="4" fill="#ffffff" />
    <circle cx="400" cy="160" r="4" fill="#ffffff" />

    <circle cx="80" cy="240" r="4" fill="#ffffff" />
    <circle cx="160" cy="240" r="4" fill="#ffffff" />
    <circle cx="240" cy="240" r="4" fill="#ffffff" />
    <circle cx="320" cy="240" r="4" fill="#ffffff" />
    <circle cx="400" cy="240" r="4" fill="#ffffff" />

    <circle cx="80" cy="320" r="4" fill="#ffffff" />
    <circle cx="160" cy="320" r="4" fill="#ffffff" />
    <circle cx="240" cy="320" r="4" fill="#ffffff" />
    <circle cx="320" cy="320" r="4" fill="#ffffff" />
    <circle cx="400" cy="320" r="4" fill="#ffffff" />

    <circle cx="80" cy="400" r="4" fill="#ffffff" />
    <circle cx="160" cy="400" r="4" fill="#ffffff" />
    <circle cx="240" cy="400" r="4" fill="#ffffff" />
    <circle cx="320" cy="400" r="4" fill="#ffffff" />
    <circle cx="400" cy="400" r="4" fill="#ffffff" />
  </g>

  <!-- Big Gold Crown/Star Badge representing "TopRank" -->
  <g transform="translate(256, 230)">
    <!-- Outer Glow -->
    <circle r="120" fill="#ffffff" opacity="0.2" />
    
    <!-- Gold Ribbon/Banner Background -->
    <path d="M -60,80 L -80,180 L 0,140 L 80,180 L 60,80 Z" fill="#ff4d6d" />
    <path d="M -20,80 L -30,190 L 0,150 L 30,190 L 20,80 Z" fill="#ff85a2" />

    <!-- Main Gold Star -->
    <!-- Points: (0,-100) (25,-30) (95,-30) (40,15) (60,85) (0,45) (-60,85) (-40,15) (-95,-30) (-25,-30) -->
    <path d="M 0,-100 L 28,-30 L 98,-30 L 42,15 L 64,85 L 0,45 L -64,85 L -42,15 L -98,-30 L -28,-30 Z" fill="url(#starGrad)" />

    <!-- Cute Smiling Face on Star -->
    <circle cx="-20" cy="5" r="7" fill="#333" />
    <circle cx="20" cy="5" r="7" fill="#333" />
    <path d="M -10,22 Q 0,32 10,22" stroke="#333" stroke-width="6" stroke-linecap="round" fill="none" />
    <!-- Rosy cheeks -->
    <circle cx="-32" cy="15" r="8" fill="#ff4d6d" opacity="0.6" />
    <circle cx="32" cy="15" r="8" fill="#ff4d6d" opacity="0.6" />
  </g>

  <!-- Sparkles -->
  <path d="M 80,110 L 90,125 L 105,130 L 90,135 L 80,150 L 70,135 L 55,130 L 70,125 Z" fill="#ffffff" opacity="0.9" />
  <path d="M 400,140 L 407,150 L 417,153 L 407,156 L 400,166 L 393,156 L 383,153 L 393,150 Z" fill="#ffffff" opacity="0.9" />
  <path d="M 110,340 L 115,348 L 123,350 L 115,352 L 110,360 L 105,352 L 97,350 L 105,348 Z" fill="#ffffff" opacity="0.8" />

  <!-- Text "TopRank" -->
  <text x="256" y="440" font-family="'Fredoka', 'Outfit', 'system-ui', sans-serif" font-weight="900" font-size="44" fill="#ffffff" text-anchor="middle" letter-spacing="2">TOPRANK</text>

  <!-- Glass Highlight -->
  <path d="M 24,96 C 24,56 56,24 96,24 L 416,24 C 456,24 488,56 488,96 C 488,96 360,180 96,120 C 56,110 24,96 24,96 Z" fill="url(#glassGrad)" />
</svg>
